<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Wish For You</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        .wish-card {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 2s ease-in;
        }

        h1 { font-size: 3.5rem; margin: 10px 0; color: #00d2ff; }
        p { font-size: 1.5rem; opacity: 0.8; }
        
        .name-highlight {
            color: #ff0080;
            text-shadow: 0 0 10px #ff0080;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="wish-card">
        <p id="wish-text">Sending a special wish to...</p>
        <h1 id="user-name">Guest</h1>
        <p id="custom-message">Have a wonderful day!</p>
    </div>

    <script>
        // Logic to get data from the URL
        const urlParams = new URLSearchParams(window.location.search);
        
        const name = urlParams.get('name') || "Friend";
        const wish = urlParams.get('wish') || "Best Wishes";
        const msg = urlParams.get('msg') || "Hope your day is as amazing as you are!";

        document.getElementById('user-name').innerText = name;
        document.getElementById('wish-text').innerText = wish;
        document.getElementById('custom-message').innerText = msg;
    </script>
</body>
</html>
